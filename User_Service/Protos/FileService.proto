syntax = "proto3";

package fileservice.v1;

option csharp_namespace = "FileService.Grpc";

import "google/protobuf/timestamp.proto";

service FileService {
  rpc UploadFile (UploadFileRequest) returns (FileResponse);
  rpc GetFileMeta (GetFileMetaRequest) returns (FileResponse);
  rpc GetFile (GetFileRequest) returns (GetFileResponse);
  rpc DeleteFile (DeleteFileRequest) returns (DeleteFileResponse);

  rpc AddUsedBy (AddUsedByRequest) returns (UsedByResponse);
  rpc GetFileUsages (GetFileUsagesRequest) returns (GetFileUsagesResponse);
}

message UploadFileRequest {
  string original_name = 1;
  string mime_type = 2;
  int64 size_bytes = 3;
  string file_type = 4;

  optional int64 chat_id = 5;
}

message FileResponse {
  int64 id = 1;
  string public_id = 2;

  string original_name = 3;
  string blob_url = 4;
  string mime_type = 5;
  int64 size_bytes = 6;
  string file_type = 7;

  google.protobuf.Timestamp created_at = 8;
}

message GetFileMetaRequest {
  string public_id = 1;
}

message GetFileRequest {
  string public_id = 1;
}

message GetFileResponse {
  string public_id = 1;
  string file_url = 2;
  google.protobuf.Timestamp expires_at = 3;
}

message DeleteFileRequest {
  string public_id = 1;
}

message DeleteFileResponse {
  bool success = 1;
}

message AddUsedByRequest {
  string file_public_id = 1;
  int64 chat_id = 2;
}

message UsedByResponse {
  int64 id = 1;
  int64 file_id = 2;
  int64 chat_id = 3;
  google.protobuf.Timestamp created_at = 5;
}

message GetFileUsagesRequest {
  string file_public_id = 1;
}

message GetFileUsagesResponse {
  repeated UsedByResponse usages = 1;
}